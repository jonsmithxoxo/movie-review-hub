{% extends "base.html" %}
{% block content %}

<!-- reCAPTCHA script -->
<script src="https://www.google.com/recaptcha/api.js" async defer></script>

<div class="auth-bg">
  <div class="auth-noise"></div>

  <div class="auth-shell">
    <div class="auth-card">
      
      <div class="auth-header">
        <h1>Welcome Back</h1>
        <p>Sign in to your Movie Hub account</p>
      </div>

      <form class="auth-form" method="POST" action="{{ url_for('signin') }}">
        
        <div class="input-group">
          <input 
            type="email" 
            name="email" 
            id="email"
            required 
            placeholder=" "
            autocomplete="email"
          >
          <label for="email">Email address</label>
        </div>

        <div class="input-group">
          <input 
            type="password" 
            name="password" 
            id="password"
            required 
            placeholder=" "
            autocomplete="current-password"
          >
          <label for="password">Password</label>
        </div>

        <!-- ✅ CAPTCHA -->
        <div style="margin:20px 0;">
          <div class="g-recaptcha" data-sitekey="6LfrUM4sAAAAACVLJagk0QAj2iOfL_BGyza_GIue"></div>
        </div>

        <button type="submit" class="auth-primary">
          Sign In
        </button>

      </form>

      <div class="auth-meta">
        <span>Don’t have an account?</span>
        <a href="{{ url_for('signup') }}">Create one</a>
      </div>

    </div>
  </div>
</div>

{% endblock %}
